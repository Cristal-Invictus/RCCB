<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liste de présence - RCCB</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Plateforme d’enregistrement des participants (Liste de présence)</h1>
    <p>Choisissez une date, puis enregistrez les participants présents. Les responsables pourront consulter et exporter la liste via l’espace admin.</p>
  <p><a href="/admin/login" style="color:#e0f2fe; text-decoration:underline;">Accès admin</a></p>
  </header>

  <main class="grid" style="grid-template-columns:1fr; max-width:980px; margin:0 auto;">
    <section class="card">
      <h2>Enregistrer une présence</h2>
      <form id="inscriptionForm">
        <div class="row">
          <label>Date de présence<input type="date" name="presence_date" required /></label>
          <label>&nbsp;<input disabled style="visibility:hidden" /></label>
        </div>
        <div class="row">
          <label>Nom<input name="nom" required /></label>
          <label>Prénom<input name="prenom" required /></label>
        </div>
        <div class="row">
          <label>Date de naissance<input type="date" name="date_naissance" required /></label>
          <label>Sexe
            <select name="sexe" required>
              <option value="">Choisir</option>
              <option>Masculin</option>
              <option>Féminin</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Profession<input name="profession" /></label>
          <label>Téléphone<input name="telephone" /></label>
        </div>
        <div class="row">
          <label>Photo
            <input type="file" name="photo" accept="image/*" />
          </label>
          <label>&nbsp;<input disabled style="visibility:hidden" /></label>
        </div>
        <div class="row">
          <label>Situation relationnelle
            <select name="situation_relationnelle">
              <option value="">Choisir</option>
              <option value="Célibataire">Célibataire</option>
              <option value="Libre">Libre</option>
              <option value="Engagé(e)">Engagé(e)</option>
              <option value="En couple">En couple</option>
              <option value="Marié(e)">Marié(e)</option>
              <option value="Divorcé(e)">Divorcé(e)</option>
              <option value="Veuf/Veuve">Veuf/Veuve</option>
            </select>
          </label>
          <label>&nbsp;
            <input disabled style="visibility:hidden" />
          </label>
        </div>
        <div class="row">
          <label>Vicariat<select name="vicariat" id="vicariat" required></select></label>
          <label>Paroisse<select name="paroisse" id="paroisse" required></select></label>
        </div>
        <label>Commentaires<textarea name="commentaires" rows="3"></textarea></label>
  <button type="submit">Enregistrer</button>
      </form>
      <p id="flash"></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
