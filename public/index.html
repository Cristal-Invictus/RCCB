<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCCB - Liste de présence</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Service de la coordination de la jeunesse du groupe de prière Renouveau Charismatique Catholique de l'archidiocèse</h1>
    <p>Plateforme de liste de présence pour les réunions</p>
  </header>

  <main class="grid" style="grid-template-columns:1fr; max-width:900px; margin:0 auto;">
    <section class="card">
      <h2>Nouvelle présence</h2>
      <form id="inscriptionForm">
        <div class="row">
          <label>Date de présence<input type="date" name="presence_date" required /></label>
          <label>Date de naissance<input type="date" name="date_naissance" required /></label>
        </div>
        <div class="row">
          <label>Nom<input name="nom" required /></label>
          <label>Prénom<input name="prenom" required /></label>
        </div>
        <div class="row">
          <label>Sexe
            <select name="sexe" required>
              <option value="">Choisir</option>
              <option>Masculin</option>
              <option>Féminin</option>
            </select>
          </label>
          <label>Situation relationnelle
            <select name="situation_relationnelle" required>
              <option value="">Choisir</option>
              <option>Célibataire</option>
              <option>Libre de toute relation</option>
              <option>Engagé(e)</option>
              <option>En couple</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Profession<input name="profession" /></label>
          <label>Téléphone<input name="telephone" /></label>
        </div>
        <div class="row">
          <label>Photo (URL)<input name="photo" /></label>
        </div>
        <div class="row">
          <label>Vicariat<select name="vicariat" id="vicariat" required></select></label>
          <label>Paroisse<select name="paroisse" id="paroisse" required></select></label>
        </div>
        <label>Commentaires<textarea name="commentaires" rows="3"></textarea></label>
        <button type="submit">Enregistrer</button>
      </form>
      <p id="flash"></p>
    </section>

    <section class="card">
      <h2>Dashboard</h2>
      <div class="row">
        <label>Filtrer par date de présence<input id="presenceDateFilter" type="date" /></label>
      </div>
      <div class="stats" id="stats"></div>
      <input id="search" placeholder="Recherche..." />
      <div class="tableWrap">
        <table>
          <thead>
            <tr><th>Date présence</th><th>Nom</th><th>Date de naissance</th><th>Sexe</th><th>Relation</th><th>Vicariat</th><th>Paroisse</th><th>Contact</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
