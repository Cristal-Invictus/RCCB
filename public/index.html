<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCCB - Inscriptions</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Inscriptions RCCB Bénin</h1>
    <p>Plateforme partagée (déployable) pour les inscriptions</p>
  <p><a href="/admin/login" style="color:#e0f2fe; text-decoration:underline;">Accès admin</a></p>
  </header>

  <main class="grid" style="grid-template-columns:1fr; max-width:980px; margin:0 auto;">
    <section class="card">
      <h2>Nouvelle inscription</h2>
      <form id="inscriptionForm">
        <div class="row">
          <label>Nom<input name="nom" required /></label>
          <label>Prénom<input name="prenom" required /></label>
        </div>
        <div class="row">
          <label>Âge<input type="number" name="age" min="1" max="120" required /></label>
          <label>Sexe
            <select name="sexe" required>
              <option value="">Choisir</option>
              <option>Masculin</option>
              <option>Féminin</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Profession<input name="profession" /></label>
          <label>Téléphone<input name="telephone" /></label>
        </div>
        <div class="row">
          <label>Email<input type="email" name="email" /></label>
          <label>Photo
            <input type="file" name="photo" accept="image/*" />
          </label>
        </div>
        <div class="row">
          <label>Statut marital
            <select name="statut_marital">
              <option value="">Choisir</option>
              <option>Célibataire</option>
              <option>Marié(e)</option>
              <option>Divorcé(e)</option>
              <option>Veuf / Veuve</option>
            </select>
          </label>
          <label>&nbsp;
            <input disabled style="visibility:hidden" />
          </label>
        </div>
        <div class="row">
          <label>Vicariat<select name="vicariat" id="vicariat" required></select></label>
          <label>Paroisse<select name="paroisse" id="paroisse" required></select></label>
        </div>
        <label>Commentaires<textarea name="commentaires" rows="3"></textarea></label>
  <button type="submit">✅ S’inscrire</button>
      </form>
      <p id="flash"></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
